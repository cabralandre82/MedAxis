name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  # ─── Unit Tests ────────────────────────────────────────────────────────────
  unit-tests:
    name: Unit Tests (Vitest)
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run unit tests with coverage
        run: npm run test:coverage

      - name: Upload coverage report
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: coverage-report
          path: coverage/
          retention-days: 14

  # ─── Lint & Type Check ─────────────────────────────────────────────────────
  lint:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        run: npm run lint

      - name: Run TypeScript type check
        run: npx tsc --noEmit

  # ─── E2E Smoke Tests (against Vercel Preview) ──────────────────────────────
  e2e-smoke:
    name: E2E Smoke (Playwright)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: [unit-tests, lint]
    # Only run on PRs if staging URL is available
    if: github.event_name == 'push' || (github.event_name == 'pull_request' && vars.E2E_STAGING_URL != '')

    steps:
      - uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps

      # Trilho B do baseline v1.0.0-launch-ready: golden-path roda
      # junto com smoke num único batch. Cobre regressões funcionais
      # observadas em incidentes pré-lançamento (galeria, sticky bar,
      # coupon types, server-logs, pricing preview API) — ver
      # tests/e2e/golden-path.test.ts.
      - name: Run E2E smoke + golden-path tests
        run: npm run test:e2e:bloqueante
        env:
          # Wave 5 — when no staging URL is configured we let Playwright
          # boot a local dev server against the staging Supabase project.
          # The webServer only sees the env vars listed in playwright.config.ts,
          # which reads these `process.env` entries.
          BASE_URL: ${{ vars.E2E_STAGING_URL || 'http://localhost:3000' }}
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.E2E_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.E2E_SUPABASE_ANON_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.E2E_SUPABASE_SERVICE_ROLE_KEY }}
          ENCRYPTION_KEY: ${{ secrets.E2E_ENCRYPTION_KEY }}
          NEXT_PUBLIC_APP_URL: http://localhost:3000
          E2E_SUPER_ADMIN_EMAIL: ${{ secrets.E2E_SUPER_ADMIN_EMAIL }}
          E2E_SUPER_ADMIN_PASSWORD: ${{ secrets.E2E_SUPER_ADMIN_PASSWORD }}
          # Wave Hardening III — produção zerou critical/serious do axe.
          # Mantém o smoke a11y como guard rail bloqueante: qualquer
          # regressão WCAG 2.1 AA derruba o pipeline.
          STRICT_A11Y: '1'

      - name: Upload Playwright report
        uses: actions/upload-artifact@v7
        if: failure()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
